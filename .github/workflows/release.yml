name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes

  build:
    name: Build release binary (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: x86_64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: x86_64-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: aarch64-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: x86_64-windows

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build release binary
        env:
          VERSION: ${{ github.ref_name }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary as release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          BINARY="cs-${{ matrix.asset_name }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BINARY="${BINARY}.exe"
            cp "target/${{ matrix.target }}/release/cs.exe" "$BINARY"
          else
            cp "target/${{ matrix.target }}/release/cs" "$BINARY"
          fi
          gh release upload "$TAG_NAME" "$BINARY" --clobber

  build-linux-arm64:
    name: Build release binary (aarch64-unknown-linux-gnu)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        env:
          VERSION: ${{ github.ref_name }}
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Upload binary as release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          cp target/aarch64-unknown-linux-gnu/release/cs "cs-aarch64-linux"
          gh release upload "$TAG_NAME" "cs-aarch64-linux" --clobber

  update-demo:
    name: Update demo.gif
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser

      - name: Install ttyd
        run: |
          TTYD_VERSION="1.7.7"
          wget -qO /usr/local/bin/ttyd "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64"
          chmod +x /usr/local/bin/ttyd

      - name: Install vhs
        run: |
          VHS_VERSION="0.11.0"
          wget -qO /tmp/vhs.deb "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION}_linux_amd64.deb"
          sudo dpkg -i /tmp/vhs.deb

      - name: Install nerd fonts
        run: |
          mkdir -p ~/.local/share/fonts
          wget -qO - https://github.com/ryanoasis/nerd-fonts/releases/download/v3.3.0/FiraCode.zip | unzip -q -d ~/.local/share/fonts/
          fc-cache -fv

      - name: Build release binary
        run: cargo build --release

      - name: Generate demo.gif
        run: vhs demo.tape

      - uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: Update demo.gif
          branch: main
          commit_user_name: vhs-action
          commit_user_email: actions@github.com
          commit_author: vhs-action <actions@github.com>
          file_pattern: '*.gif'
